services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2026_1_travel_flask
    depends_on:
      - mariadb
    ports:
      - 81:80 # 0 - 1024 reserved. Use any port from 1025 to 65535
      # 81 = host port (my mac) 80 = container port (inside docker)
    volumes:
      - .:/app

  mariadb:
    image: mariadb:10.6.20
    container_name: 2026_1_travel_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: 2026_1_travel
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - 3308:3306

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: 2026_1_travel_phpmyadmin
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - 8081:80

volumes:
  mariadb_data:



